services:
  db:
    image: postgres:16-alpine
    container_name: qr_registros_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_db_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qr_registros_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-change_me_db_password}@db:5432/attendance_db
      APP_NAME: QR Attendance System
      BASE_URL: http://localhost:8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      SECRET_KEY: ${SECRET_KEY:-change_me_secret_key}
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
