version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: qr_registros_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d attendance_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - qr-network

  app:
    image: python:3.12-slim
    container_name: qr_registros_dev_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/attendance_db
      APP_NAME: QR Attendance System
      BASE_URL: http://localhost:8000
      SECRET_KEY: 09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7
      MASTER_BOOTSTRAP_KEY: admin1234
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      MAX_FAILED_LOGIN_ATTEMPTS: "5"
      LOCKOUT_DURATION_MINUTES: "15"
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python -m alembic upgrade head &&
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - qr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_dev_data:

networks:
  qr-network:
    driver: bridge
